<div class="all slide-in center-text">
  <h1>Willkommen auf deiner Einkaufsliste</h1>
  <div class="items">
    @for (item of items; track item.id) {
      <div class="item">
        {{ item.name }}, <button class="delete" (click)="deleteItem(item.id)">X</button>
      </div>
    } @empty {
      <p>Deine Einkaufsliste ist leer.</p>
    }
    <button class="add" (click)="addItem()">+</button>
  </div>
</div>
